<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Ödeme — Autonax</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #fff5f3 0%, #fae4de 100%);
      min-height: 100vh;
      color: #2d1b16;
      padding: 20px;
    }
    .konteyner { max-width: 580px; margin: 0 auto; padding-top: 30px; }

    .logo-alan { text-align: center; margin-bottom: 30px; }
    .logo-alan h1 {
      font-family: 'Bebas Neue', sans-serif; color: #a13128; font-size: 48px;
      margin: 0; letter-spacing: 3px;
    }

    .kart {
      background: white; border-radius: 16px; padding: 30px;
      box-shadow: 0 10px 40px rgba(161, 49, 40, 0.12);
      margin-bottom: 20px;
    }

    .ozet-baslik { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .ozet-baslik h2 { margin: 0; color: #a13128; font-size: 18px; font-weight: 600; }
    .ozet-baslik p { margin: 4px 0 0; font-size: 13px; color: #8a6d63; }

    .tutar-kart {
      background: linear-gradient(135deg, #fff5f3 0%, #ffe0d9 100%);
      padding: 20px; border-radius: 12px; margin: 16px 0; text-align: center;
      border: 2px solid #f9d2c8;
      transition: all 0.3s;
    }
    .tutar-kart .etiket { font-size: 12px; color: #a13128; text-transform: uppercase; font-weight: 600; letter-spacing: 1px; }
    .tutar-kart .deger { font-size: 36px; font-weight: 700; color: #7a231a; margin-top: 4px; }
    .tutar-kart .eski-tutar { font-size: 13px; color: #8a6d63; text-decoration: line-through; margin-top: 4px; }
    .tutar-kart .vade-not {
      font-size: 11.5px; color: #a13128; margin-top: 8px; font-weight: 600;
      padding: 6px 10px; border-top: 1px solid #f9d2c8;
      background: rgba(251, 222, 213, 0.3); border-radius: 6px;
      line-height: 1.45;
    }
    .tutar-kart .vade-not.firma { 
      color: #16a34a; 
      background: rgba(240, 253, 244, 0.8);
      border-top-color: #bbf7d0;
    }

    .bilgi-sati { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f4e3dd; }
    .bilgi-sati:last-child { border-bottom: none; }
    .bilgi-sati .etiket { color: #8a6d63; font-size: 14px; }
    .bilgi-sati .deger { color: #2d1b16; font-weight: 500; font-size: 14px; }

    .form-baslik { color: #a13128; font-size: 16px; font-weight: 600; margin: 0 0 12px; }
    .form-grup { margin-bottom: 14px; }
    .form-grup label {
      display: block; font-size: 12px; color: #8a6d63;
      font-weight: 600; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .form-grup input, .form-grup select, .form-grup textarea {
      width: 100%; padding: 12px 14px; border: 1px solid #e8d4ce;
      border-radius: 8px; font-family: inherit; font-size: 15px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s; background: white;
    }
    .form-grup input:focus, .form-grup select:focus, .form-grup textarea:focus {
      border-color: #a13128; box-shadow: 0 0 0 3px rgba(161, 49, 40, 0.1);
    }
    .form-grup textarea { resize: vertical; min-height: 60px; }
    .form-satir-3 { display: grid; grid-template-columns: 2fr 2fr 1.5fr; gap: 12px; }

    /* Vade secici CSS — KALDIRILDI (artık müşteri seçimi yok) */

    .kart-marka-bilgi {
      margin-top: 6px; padding: 8px 10px; background: #fff5f3; border-radius: 6px;
      font-size: 11px; color: #a13128; display: none;
    }
    .kart-marka-bilgi.gorunur { display: block; }
    .kart-marka-bilgi .marka { font-weight: 700; }

    .odeme-btn {
      width: 100%; padding: 16px; background: linear-gradient(135deg, #a13128, #7a231a);
      color: white; border: none; border-radius: 10px; font-size: 17px; font-weight: 700;
      cursor: pointer; transition: all 0.2s; margin-top: 20px;
    }
    .odeme-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(161, 49, 40, 0.3); }
    .odeme-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .guven-bilgi {
      text-align: center; color: #8a6d63; font-size: 12px; margin-top: 16px;
    }

    .yukleniyor { display: none; text-align: center; padding: 40px 20px; }
    .yukleniyor.gorunur { display: block; }
    .yukleniyor .spinner {
      width: 40px; height: 40px; border: 3px solid #f9d2c8;
      border-top-color: #a13128; border-radius: 50%;
      animation: spin 1s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hata-mesaj {
      display: none; background: #fff5f3; border: 1px solid #a13128;
      color: #7a231a; padding: 12px 14px; border-radius: 8px;
      margin-bottom: 16px; font-size: 14px; font-weight: 500;
    }
    .hata-mesaj.gorunur { display: block; }

    @media (max-width: 520px) {
      .form-satir-3 { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>

<body>
  <div class="konteyner">
    <div class="logo-alan">
      <h1>AUTONAX</h1>
    </div>

    <div id="yukleniyor" class="yukleniyor">
      <div class="spinner"></div>
      <p style="color: #8a6d63;">Ödeme bilgileri yükleniyor...</p>
    </div>

    <div id="icerik" style="display: none;">
      <div class="kart">
        <div class="ozet-baslik">
          <div>
            <h2>Ödeme Özeti</h2>
            <p>Bilgileri kontrol edip ödemenizi tamamlayın</p>
          </div>
        </div>

        <div class="tutar-kart" id="tutar-kart">
          <div class="etiket">Ödenecek Tutar</div>
          <div class="deger" id="ozet-tutar">--</div>
          <div class="eski-tutar" id="eski-tutar" style="display:none"></div>
          <div class="vade-not" id="vade-not" style="display:none"></div>
        </div>

        <div id="ozet-bilgileri"></div>
      </div>

      <div class="kart">
        <h3 class="form-baslik">Kredi Kartı / Banka Kartı ile Ödeme</h3>

        <div id="hata-mesaj" class="hata-mesaj"></div>

        <form id="odeme-form">
          <div class="form-grup">
            <label for="cc_owner">Kart Üzerindeki İsim</label>
            <input type="text" id="cc_owner" name="cc_owner" required autocomplete="cc-name" placeholder="JOHN DOE" />
          </div>

          <div class="form-grup">
            <label for="card_number">Kart Numarası</label>
            <input type="text" id="card_number" name="card_number" required inputmode="numeric" autocomplete="cc-number" maxlength="23" placeholder="0000 0000 0000 0000" />
            <div id="kart-marka-bilgi" class="kart-marka-bilgi">
              <span>🏦 Algılanan: </span>
              <span class="marka" id="kart-marka"></span>
              <span id="kart-banka"></span>
            </div>
          </div>

          <div class="form-satir-3">
            <div class="form-grup">
              <label for="expiry_month">Son Kul. Ay</label>
              <input type="text" id="expiry_month" name="expiry_month" required inputmode="numeric" autocomplete="cc-exp-month" maxlength="2" placeholder="12" />
            </div>
            <div class="form-grup">
              <label for="expiry_year">Son Kul. Yıl</label>
              <input type="text" id="expiry_year" name="expiry_year" required inputmode="numeric" autocomplete="cc-exp-year" maxlength="2" placeholder="26" />
            </div>
            <div class="form-grup">
              <label for="cvv">CVC / CVV</label>
              <input type="text" id="cvv" name="cvv" required inputmode="numeric" autocomplete="cc-csc" maxlength="4" placeholder="000" />
            </div>
          </div>

          <!-- Vade farkı müşteriye sorulmaz — Admin panelinden belirlenir. 
               Müşteri sadece Özet/Taksit kutusunda sonucu görür: 
               • Firma karşılıyorsa tutar sabit kalır (+%X firma)
               • Müşteri karşılıyorsa taksit tutarına dahil edilir -->

          <div class="form-grup">
            <label for="taksit">Taksit Seçimi</label>
            <select id="taksit" name="taksit">
              <option value="0">Tek Çekim</option>
            </select>
            <div id="taksit-detay" style="margin-top:8px;font-size:12px;color:#8a6d63;display:none"></div>
          </div>

          <div class="form-grup">
            <label for="musteri_notu">Not (Opsiyonel)</label>
            <textarea id="musteri_notu" name="musteri_notu" placeholder="Siparişinizle ilgili notunuz..."></textarea>
          </div>

          <button type="submit" class="odeme-btn" id="odeme-btn">
            💳 Ödeme Yap
          </button>

          <div class="guven-bilgi">
            🔒 SSL güvenli · PayTR altyapısı · 3D Secure
          </div>
        </form>
      </div>
    </div>

    <div id="genel-hata" style="display: none;" class="kart">
      <h2 style="color: #a13128; margin: 0 0 12px;">⚠️ Ödeme Başlatılamadı</h2>
      <p id="genel-hata-mesaj" style="color: #2d1b16; margin: 0;"></p>
    </div>
  </div>

  <script>
    var KOD = window.location.pathname.split('/').pop();
    var mevcutBorc = null;
    var TAKSIT_ORANLARI = {};
    var VADE_KARSILAYAN_FIRMA = true;
    var SECILEN_MARKA = null;
    var BIN_SORGU_TIMER = null;
    var SON_BIN = null;
    
    // URL parametrelerini oku
    var URL_PARAMS = new URLSearchParams(window.location.search);
    // Panel'den direkt tetiklenen ödeme mi? ?mod=panel parametresi ile panel operatörü vade seçebilir
    var PANEL_MOD = URL_PARAMS.get('mod') === 'panel';
    // URL'den vade override (panel'den "?vade=firma" veya "?vade=musteri" gelirse panel ayarını ez)
    var VADE_URL_OVERRIDE = URL_PARAMS.get('vade'); // 'firma' | 'musteri' | null

    var yukleniyorEl = document.getElementById('yukleniyor');
    var icerikEl = document.getElementById('icerik');
    var genelHataEl = document.getElementById('genel-hata');
    var genelHataMesajEl = document.getElementById('genel-hata-mesaj');
    var hataMesajEl = document.getElementById('hata-mesaj');
    var formEl = document.getElementById('odeme-form');
    var odemeBtn = document.getElementById('odeme-btn');
    var taksitSelectEl = document.getElementById('taksit');
    var taksitDetayEl = document.getElementById('taksit-detay');
    var ozetTutarEl = document.getElementById('ozet-tutar');
    var eskiTutarEl = document.getElementById('eski-tutar');
    var vadeNotEl = document.getElementById('vade-not');
    var kartMarkaBilgiEl = document.getElementById('kart-marka-bilgi');
    var kartMarkaEl = document.getElementById('kart-marka');
    var kartBankaEl = document.getElementById('kart-banka');

    function paraFormat(tutar) {
      return tutar.toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' ₺';
    }

    document.getElementById('card_number').addEventListener('input', function(e) {
      var v = e.target.value.replace(/\s/g, '');
      if (v.length > 19) v = v.substring(0, 19); // Amex/bazı kartlar 19 hane
      // Sadece rakam kabul et
      v = v.replace(/\D/g, '');
      e.target.value = v.replace(/(.{4})/g, '$1 ').trim();

      if (v.length >= 6) {
        var bin = v.substring(0, 6);
        if (bin !== SON_BIN) {
          SON_BIN = bin;
          if (BIN_SORGU_TIMER) clearTimeout(BIN_SORGU_TIMER);
          BIN_SORGU_TIMER = setTimeout(function() { binSorgu(bin); }, 600);
        }
      } else {
        SECILEN_MARKA = null;
        SON_BIN = null;
        kartMarkaBilgiEl.classList.remove('gorunur');
        taksitSeceneklerGuncelle();
      }
    });

    ['expiry_month', 'expiry_year', 'cvv'].forEach(function(id){
      document.getElementById(id).addEventListener('input', function(e) {
        e.target.value = e.target.value.replace(/\D/g, '');
      });
    });

    taksitSelectEl.addEventListener('change', function() {
      tutarGuncelle();
    });

    // Vade butonlari — KALDIRILDI
    // Vade karşılayan taraf (firma/müşteri) admin panelinden /api/odeme/taksit-bilgi'de belirlenir.
    // Müşteri seçim yapmaz, sadece tutar/taksit kutusunda sonucu görür.
    function vadeButonGuncelle() {
      // Artık buton yok — sadece tutarGuncelle() çalıştırılıyor ki taksit label'ları ve özet güncellensin
      // Bu fonksiyon backward compat için mevcut, boş bırakılmasın diye.
    }

    function binSorgu(bin) {
      fetch('/api/odeme/paytr/bin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ binNumber: bin })
      })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.success && d.data) {
          var marka = d.data.brand || '';
          var banka = d.data.bank || '';
          kartMarkaEl.textContent = marka || 'Bilinmeyen';
          kartBankaEl.textContent = banka ? ' (' + banka + ')' : '';
          kartMarkaBilgiEl.classList.add('gorunur');
          SECILEN_MARKA = markaEslestir(marka);
        } else {
          kartMarkaEl.textContent = 'Yabancı kart / Tanımsız';
          kartBankaEl.textContent = '';
          kartMarkaBilgiEl.classList.add('gorunur');
          SECILEN_MARKA = null;
        }
        taksitSeceneklerGuncelle();
      })
      .catch(function(err) {
        console.error('BIN sorgu hatasi:', err);
        SECILEN_MARKA = null;
        taksitSeceneklerGuncelle();
      });
    }

    function markaEslestir(paytrMarka) {
      if (!paytrMarka) return null;
      var keys = Object.keys(TAKSIT_ORANLARI);
      var paytrLower = paytrMarka.toLowerCase();
      for (var i = 0; i < keys.length; i++) {
        if (keys[i].toLowerCase() === paytrLower) return keys[i];
      }
      for (var i = 0; i < keys.length; i++) {
        if (paytrLower.indexOf(keys[i].toLowerCase()) !== -1 ||
            keys[i].toLowerCase().indexOf(paytrLower) !== -1) return keys[i];
      }
      return null;
    }

    function aktifOranlariAl() {
      var markalar = Object.keys(TAKSIT_ORANLARI);
      if (markalar.length === 0) return null;
      if (SECILEN_MARKA && TAKSIT_ORANLARI[SECILEN_MARKA]) {
        return TAKSIT_ORANLARI[SECILEN_MARKA];
      }
      // Marka tespit edilemedi - taksit verme (Ziraat Combo gibi kartlar icin)
      // Eskiden buraya ilk markayi default alirdik ama bu yanlis hesaba yol aciyor
      return null;
    }

    function taksitSeceneklerGuncelle() {
      if (!mevcutBorc) return;
      var tutar = mevcutBorc.tutar;
      var oranlar = aktifOranlariAl();
      var secili = taksitSelectEl.value;

      taksitSelectEl.innerHTML = '';

      // Tek çekim
      var oran1 = oranlar ? (oranlar[1] || 0) : 0;
      var metin1 = 'Tek Çekim - ' + paraFormat(tutar);
      if (oran1 > 0 && !VADE_KARSILAYAN_FIRMA) {
        var yeni1 = tutar * (1 + oran1/100);
        metin1 = 'Tek Çekim - ' + paraFormat(yeni1) + ' (+%' + oran1 + ' vade farkı)';
      }
      // Firma karşılıyorsa etiket sadece fiyat gösterir, "firma" demez (müşteri merak etmez)
      var opt1 = document.createElement('option');
      opt1.value = '0';
      opt1.textContent = metin1;
      taksitSelectEl.appendChild(opt1);

      // Taksitler (sadece marka tespit edildiyse)
      if (oranlar) {
        for (var ay = 2; ay <= 12; ay++) {
          var oran = oranlar[ay] || 0;
          var metin;
          if (oran > 0 && !VADE_KARSILAYAN_FIRMA) {
            // Müşteri öder: toplam artar, aylık da artar
            var yeniTop = tutar * (1 + oran/100);
            var aylikYeni = yeniTop / ay;
            metin = ay + ' Taksit - ' + paraFormat(aylikYeni) + '/ay (Toplam ' + paraFormat(yeniTop) + ')';
          } else if (oran > 0 && VADE_KARSILAYAN_FIRMA) {
            // Firma karşılıyor: müşteri için fiyat sabit
            var aylik = tutar / ay;
            metin = ay + ' Taksit - ' + paraFormat(aylik) + '/ay (Toplam ' + paraFormat(tutar) + ')';
          } else {
            // Vade farkı yok
            metin = ay + ' Taksit - ' + paraFormat(tutar / ay) + '/ay';
          }
          var opt = document.createElement('option');
          opt.value = ay.toString();
          opt.textContent = metin;
          taksitSelectEl.appendChild(opt);
        }
      }

      taksitSelectEl.value = secili || '0';
      tutarGuncelle();
    }

    function tutarGuncelle() {
      if (!mevcutBorc) return;
      var tutar = mevcutBorc.tutar;
      var secim = parseInt(taksitSelectEl.value) || 0;
      var oranlar = aktifOranlariAl();
      var ay = secim === 0 ? 1 : secim;
      var oran = oranlar ? (oranlar[ay] || 0) : 0;
      var gosterilecekTutar = tutar;

      if (oran > 0 && !VADE_KARSILAYAN_FIRMA) {
        // Vade farkı müşteriye yükleniyor (admin öyle ayarlamış)
        gosterilecekTutar = tutar * (1 + oran/100);
        ozetTutarEl.textContent = paraFormat(gosterilecekTutar);
        eskiTutarEl.textContent = paraFormat(tutar);
        eskiTutarEl.style.display = 'block';
        var fark = gosterilecekTutar - tutar;
        vadeNotEl.innerHTML = 'Taksit vade farkı <b>+%' + oran + '</b> (' + paraFormat(fark) + ') tutara dahildir';
        vadeNotEl.className = 'vade-not';
        vadeNotEl.style.display = 'block';
      } else if (oran > 0 && VADE_KARSILAYAN_FIRMA) {
        // Vade farkı firma karşılıyor — müşteri orijinal tutarı öder
        ozetTutarEl.textContent = paraFormat(tutar);
        eskiTutarEl.style.display = 'none';
        vadeNotEl.innerHTML = '✓ Vade farkı (%' + oran + ') <b>firma tarafından karşılanır</b> — ek ücret yok';
        vadeNotEl.className = 'vade-not firma';
        vadeNotEl.style.display = 'block';
      } else {
        // Vade farkı yok (tek çekim veya vadesiz taksit)
        ozetTutarEl.textContent = paraFormat(tutar);
        eskiTutarEl.style.display = 'none';
        vadeNotEl.style.display = 'none';
      }

      if (secim >= 2) {
        var aylikTut = gosterilecekTutar / secim;
        taksitDetayEl.textContent = secim + ' x ' + paraFormat(aylikTut) + ' aylık ödeme';
        taksitDetayEl.style.display = 'block';
      } else {
        taksitDetayEl.style.display = 'none';
      }
    }

    function linkYukle() {
      fetch('/api/odeme/link/' + KOD)
        .then(function(r) { return r.json(); })
        .then(function(d) {
          if (!d.success) {
            genelHataMesajEl.textContent = d.error || 'Ödeme linki bulunamadı';
            yukleniyorEl.style.display = 'none';
            genelHataEl.style.display = 'block';
            return null;
          }
          mevcutBorc = d.data;
          if (mevcutBorc.durum === 'ODENDI') {
            window.location.href = '/odeme-basarili?oid=' + mevcutBorc.siparisId;
            return null;
          }
          if (new Date(mevcutBorc.sonGecerlilik) < new Date()) {
            genelHataMesajEl.textContent = 'Bu ödeme linkinin süresi dolmuş.';
            yukleniyorEl.style.display = 'none';
            genelHataEl.style.display = 'block';
            return null;
          }

          ozetTutarEl.textContent = paraFormat(mevcutBorc.tutar);
          var bilgiHTML =
            '<div class="bilgi-sati"><span class="etiket">Hizmet</span><span class="deger">' + (mevcutBorc.aciklama || 'Autonax Hizmeti') + '</span></div>' +
            '<div class="bilgi-sati"><span class="etiket">Ad Soyad</span><span class="deger">' + mevcutBorc.musteriAdi + '</span></div>' +
            (mevcutBorc.musteriEmailMaskeli ? '<div class="bilgi-sati"><span class="etiket">E-posta</span><span class="deger">' + mevcutBorc.musteriEmailMaskeli + '</span></div>' : '') +
            '<div class="bilgi-sati"><span class="etiket">Son Geçerlilik</span><span class="deger">' + new Date(mevcutBorc.sonGecerlilik).toLocaleString('tr-TR', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) + '</span></div>';
          document.getElementById('ozet-bilgileri').innerHTML = bilgiHTML;

          return fetch('/api/odeme/taksit-bilgi');
        })
        .then(function(r) { return r ? r.json() : null; })
        .then(function(d) {
          if (d && d.success && d.data) {
            TAKSIT_ORANLARI = d.data.taksitOranlari || {};
            VADE_KARSILAYAN_FIRMA = d.data.vadeKarsilayanFirma !== false;
          }
          // URL override — Panel operatörü link oluştururken ?vade=firma/musteri gönderdiyse onu kullan
          if (VADE_URL_OVERRIDE === 'firma') VADE_KARSILAYAN_FIRMA = true;
          else if (VADE_URL_OVERRIDE === 'musteri') VADE_KARSILAYAN_FIRMA = false;
          
          // Panel modu — operatör ödeme alırken vade seçebilsin
          if (PANEL_MOD) {
            panelModuGoster();
          }
          
          vadeButonGuncelle();
          taksitSeceneklerGuncelle();
          yukleniyorEl.style.display = 'none';
          icerikEl.style.display = 'block';
        })
        .catch(function(err) {
          console.error('Yukleme hatasi:', err);
          genelHataMesajEl.textContent = 'Bağlantı hatası: ' + err.message;
          yukleniyorEl.style.display = 'none';
          genelHataEl.style.display = 'block';
        });
    }
    
    /* Panel modu - operatör vade seçici göster */
    function panelModuGoster() {
      // Sayfa üstüne "PANEL MODU" rozeti ekle
      var rozet = document.createElement('div');
      rozet.style.cssText = 'background:#1e293b;color:#fff;padding:8px 14px;border-radius:8px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px;justify-content:center';
      rozet.innerHTML = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>Panel Operatör Modu · Vade Farkını Seçebilirsiniz';
      icerikEl.insertBefore(rozet, icerikEl.firstChild);
      
      // Vade seçici butonları oluştur (mevcut bilgi kutusunun altına)
      var secici = document.createElement('div');
      secici.className = 'form-grup';
      secici.id = 'panel-vade-secici';
      secici.innerHTML = 
        '<label style="color:#1e293b;font-weight:700">Vade Farkı Kime Ait? <span style="color:#888;font-weight:400;font-size:11px">(Operatör seçimi)</span></label>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">' +
          '<button type="button" id="pnl-vade-firma" style="padding:12px;border:2px solid #16a34a;border-radius:10px;background:#fff;cursor:pointer;font-family:inherit;text-align:center">' +
            '<div style="font-size:13px;font-weight:700;color:#16a34a">FİRMADAN KESİLSİN</div>' +
            '<div style="font-size:10px;opacity:.7;margin-top:2px">Müşteri sabit tutar öder</div>' +
          '</button>' +
          '<button type="button" id="pnl-vade-musteri" style="padding:12px;border:2px solid #ea580c;border-radius:10px;background:#fff;cursor:pointer;font-family:inherit;text-align:center">' +
            '<div style="font-size:13px;font-weight:700;color:#ea580c">MÜŞTERİDEN KESİLSİN</div>' +
            '<div style="font-size:10px;opacity:.7;margin-top:2px">Vade farkı tutara eklenir</div>' +
          '</button>' +
        '</div>';
      // Bilgi kutusunun önüne yerleştir
      var bilgiGrup = document.getElementById('vade-bilgi-grup');
      if (bilgiGrup && bilgiGrup.parentNode) {
        bilgiGrup.parentNode.insertBefore(secici, bilgiGrup);
      }
      
      // Buton davranışı
      var bF = document.getElementById('pnl-vade-firma');
      var bM = document.getElementById('pnl-vade-musteri');
      function panelVadeBtnGuncelle() {
        if (VADE_KARSILAYAN_FIRMA) {
          bF.style.background = '#16a34a'; bF.style.color = '#fff';
          bF.querySelector('div:first-child').style.color = '#fff';
          bM.style.background = '#fff'; bM.style.color = '#ea580c';
          bM.querySelector('div:first-child').style.color = '#ea580c';
        } else {
          bM.style.background = '#ea580c'; bM.style.color = '#fff';
          bM.querySelector('div:first-child').style.color = '#fff';
          bF.style.background = '#fff'; bF.style.color = '#16a34a';
          bF.querySelector('div:first-child').style.color = '#16a34a';
        }
      }
      panelVadeBtnGuncelle();
      bF.addEventListener('click', function() {
        VADE_KARSILAYAN_FIRMA = true;
        panelVadeBtnGuncelle();
        vadeButonGuncelle();
        taksitSeceneklerGuncelle();
      });
      bM.addEventListener('click', function() {
        VADE_KARSILAYAN_FIRMA = false;
        panelVadeBtnGuncelle();
        vadeButonGuncelle();
        taksitSeceneklerGuncelle();
      });
    }

    /* Luhn algoritması ile kart numarası doğrulama */
    function luhnKontrol(cardNum) {
      if (!cardNum || !/^\d+$/.test(cardNum)) return false;
      var sum = 0;
      var alt = false;
      for (var i = cardNum.length - 1; i >= 0; i--) {
        var n = parseInt(cardNum.charAt(i), 10);
        if (alt) {
          n *= 2;
          if (n > 9) n -= 9;
        }
        sum += n;
        alt = !alt;
      }
      return sum % 10 === 0;
    }

    /* Son kullanma tarihi kontrolü - ay/yıl geçmiş mi */
    function kartGecmisMi(ay, yil) {
      var aySayi = parseInt(ay, 10);
      var yilSayi = parseInt(yil, 10);
      if (isNaN(aySayi) || aySayi < 1 || aySayi > 12) return true;
      if (isNaN(yilSayi)) return true;
      // 2 haneli yılı 4 haneli yap
      var tamYil = yilSayi < 100 ? 2000 + yilSayi : yilSayi;
      var bugun = new Date();
      var buYil = bugun.getFullYear();
      var buAy = bugun.getMonth() + 1;
      if (tamYil < buYil) return true;
      if (tamYil === buYil && aySayi < buAy) return true;
      return false;
    }

    formEl.addEventListener('submit', function(e) {
      e.preventDefault();
      hataMesajEl.classList.remove('gorunur');
      hataMesajEl.textContent = '';

      var ccOwner = document.getElementById('cc_owner').value.trim();
      var cardNumber = document.getElementById('card_number').value.replace(/\s/g, '');
      var expiryMonth = document.getElementById('expiry_month').value.trim();
      var expiryYear = document.getElementById('expiry_year').value.trim();
      var cvv = document.getElementById('cvv').value.trim();
      var installmentCount = parseInt(taksitSelectEl.value) || 0;
      var musteriNotu = document.getElementById('musteri_notu').value.trim();

      // 1. Kart üzerindeki isim
      if (!ccOwner || ccOwner.length < 3) {
        hataMesajEl.textContent = 'Kart üzerindeki ad soyadı eksiksiz girin';
        hataMesajEl.classList.add('gorunur');
        document.getElementById('cc_owner').focus();
        return;
      }
      if (ccOwner.indexOf(' ') < 0) {
        hataMesajEl.textContent = 'Ad ve soyad arasında boşluk bırakın';
        hataMesajEl.classList.add('gorunur');
        document.getElementById('cc_owner').focus();
        return;
      }

      // 2. Kart numarası - uzunluk + Luhn
      if (cardNumber.length < 13 || cardNumber.length > 19) {
        hataMesajEl.textContent = 'Kart numarası geçersiz (13-19 hane olmalı)';
        hataMesajEl.classList.add('gorunur');
        document.getElementById('card_number').focus();
        return;
      }
      if (!luhnKontrol(cardNumber)) {
        hataMesajEl.textContent = 'Kart numarası hatalı — kontrol edin';
        hataMesajEl.classList.add('gorunur');
        document.getElementById('card_number').focus();
        return;
      }

      // 3. Son kullanma tarihi
      if (!expiryMonth || expiryMonth.length < 1 || expiryMonth.length > 2) {
        hataMesajEl.textContent = 'Son kullanma ayını girin (01-12)';
        hataMesajEl.classList.add('gorunur');
        document.getElementById('expiry_month').focus();
        return;
      }
      if (!expiryYear || (expiryYear.length !== 2 && expiryYear.length !== 4)) {
        hataMesajEl.textContent = 'Son kullanma yılını girin (örn: 28)';
        hataMesajEl.classList.add('gorunur');
        document.getElementById('expiry_year').focus();
        return;
      }
      if (kartGecmisMi(expiryMonth, expiryYear)) {
        hataMesajEl.textContent = 'Kartın son kullanma tarihi geçmiş';
        hataMesajEl.classList.add('gorunur');
        document.getElementById('expiry_month').focus();
        return;
      }

      // 4. CVV
      if (cvv.length < 3 || cvv.length > 4 || !/^\d+$/.test(cvv)) {
        hataMesajEl.textContent = 'CVC/CVV hatalı (3 veya 4 hane)';
        hataMesajEl.classList.add('gorunur');
        document.getElementById('cvv').focus();
        return;
      }

      // 5. Borç/tutar kontrolü
      if (!mevcutBorc || !mevcutBorc.tutar || mevcutBorc.tutar <= 0) {
        hataMesajEl.textContent = 'Ödeme tutarı okunamadı. Sayfayı yenileyin.';
        hataMesajEl.classList.add('gorunur');
        return;
      }

      odemeBtn.disabled = true;
      odemeBtn.innerHTML = '⏳ Ödeme İşleniyor...';

      // BACKEND PAYLOAD
      // Güvenlik notu: vadeKarsilayanFirma backend'de belirleniyor (admin ayarı), 
      // client'tan gönderilmiyor. Müşteri bu değeri manipüle edemez.
      fetch('/api/odeme/paytr/direct', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          kod: KOD,
          ccOwner: ccOwner,
          cardNumber: cardNumber,
          expiryMonth: expiryMonth,
          expiryYear: expiryYear,
          cvv: cvv,
          installmentCount: installmentCount,
          musteriNotu: musteriNotu,
          // vadeKarsilayanFirma: kaldırıldı — backend kendi değerini kullanıyor
          secilenMarka: SECILEN_MARKA || null
        })
      })
      .then(function(r) {
        // HTTP status kontrolü
        if (!r.ok && r.status !== 400 && r.status !== 402) {
          throw new Error('Sunucu hatası (' + r.status + ')');
        }
        return r.json();
      })
      .then(function(d) {
        if (!d.success) {
          // Spesifik hata mesajları
          var hata = d.error || 'Ödeme başlatılamadı';
          // Bilinen PayTR hataları için daha anlaşılır mesaj
          if (/insufficient|yetersiz/i.test(hata)) hata = 'Kartınızda yeterli bakiye yok';
          else if (/invalid.*card|gecersiz.*kart/i.test(hata)) hata = 'Kart bilgileri hatalı';
          else if (/expired|gecmis/i.test(hata)) hata = 'Kartın son kullanma tarihi geçmiş';
          else if (/limit/i.test(hata)) hata = 'Kart kullanım limiti aşıldı';
          else if (/3d.*secure/i.test(hata)) hata = '3D Secure doğrulaması gerekli — bankanızı arayın';
          hataMesajEl.textContent = hata;
          hataMesajEl.classList.add('gorunur');
          odemeBtn.disabled = false;
          odemeBtn.innerHTML = '💳 Ödeme Yap';
          // Hata mesajına odaklan (mobilde kullanıcı hatayı görmeli)
          hataMesajEl.scrollIntoView({behavior:'smooth', block:'center'});
          return;
        }
        if (d.data && d.data.type === 'sync_success') {
          // Başarı — redirect'e gitmeden önce butonu kısa bir "BAŞARILI" göster
          odemeBtn.innerHTML = '✓ Ödeme Başarılı — Yönlendiriliyor...';
          odemeBtn.style.background = '#16a34a';
          setTimeout(function(){ window.location.href = d.data.redirectUrl; }, 600);
          return;
        }
        if (d.data && d.data.type === '3ds_redirect' && d.data.html3ds) {
          // 3D Secure ekranı — kullanıcıyı bilgilendir
          odemeBtn.innerHTML = '🔒 Banka Doğrulaması...';
          document.open();
          document.write(d.data.html3ds);
          document.close();
          return;
        }
        hataMesajEl.textContent = 'Beklenmeyen yanıt — lütfen tekrar deneyin';
        hataMesajEl.classList.add('gorunur');
        odemeBtn.disabled = false;
        odemeBtn.innerHTML = '💳 Ödeme Yap';
      })
      .catch(function(err) {
        console.error('Ödeme hatası:', err);
        hataMesajEl.textContent = 'Bağlantı hatası: ' + (err.message || 'İnternetinizi kontrol edin');
        hataMesajEl.classList.add('gorunur');
        odemeBtn.disabled = false;
        odemeBtn.innerHTML = '💳 Ödeme Yap';
        hataMesajEl.scrollIntoView({behavior:'smooth', block:'center'});
      });
    });

    linkYukle();
  </script>
